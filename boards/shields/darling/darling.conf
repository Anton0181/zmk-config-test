# This file was generated from a template. Edit it to match your keyboard.
# See https://zmk.dev/docs/development/hardware-integration/new-shield for more
# instructions.

# This file will be copied into the user's config directory when they add this
# keyboard. Define any Kconfig options users may frequently want to set here,
# but leave them commented out, for example:

# Uncomment to enable the encoder
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Uncomment to enable the display
# CONFIG_ZMK_DISPLAY=y
# USB‑стек обязателен, иначе после старта устройство не появится как HID
# darling.conf
# -----------------
# USB‑стек (обязателен для появления HID‑устройства)
CONFIG_ZMK_USB=y
CONFIG_USB_DEVICE_STACK=y

# BLE – включаем только если планируете беспроводное подключение
CONFIG_ZMK_BLE=y

# Размеры стеков – частая причина «мгновенного падения»
CONFIG_ISR_STACK_SIZE=1024
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_IDLE_STACK_SIZE=1024

# Имя устройства (необязательно, но удобно в отладке)
CONFIG_ZMK_KEYBOARD_NAME="DarlingKB"

# Если вам нужны дополнительные функции (например, хранение настроек):
# CONFIG_SETTINGS=y
# CONFIG_FLASH=y
